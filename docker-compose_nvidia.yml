services:
  ros2_jazzy_gpu:
    build: .
    image: var_ros2_image_gpu
    container_name: var_container_gpu
    network_mode: host
    ipc: host  # Permite que el contenedor use la memoria compartida del host
    pid: host  # Opcional, pero puede ayudar con procesos de simulación (Gazebo)

    environment:
      - DISPLAY=${DISPLAY}   # Pasa la variable de pantalla al contenedor
      - QT_X11_NO_MITSHM=1   # Para corregir errores de memoria compartida en QT
      - ROS_LOCALHOST_ONLY=1 # Config para trabajar en local sin compartir red
      - XDG_RUNTIME_DIR=/tmp/runtime-root
      # Configuración NVIDIA
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      # Forzamos a usar NVIDIA como vendedor de GLX
      - __GLX_VENDOR_LIBRARY_NAME=nvidia
      # A veces necesario para evitar conflictos de renderizado en Gazebo 
      # (principalmente en portátiles con GPU híbrida)
      - __NV_PRIME_RENDER_OFFLOAD=1
      - __VK_LAYER_NV_optimus=NVIDIA_only

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw          # Compartir gráficos
      - ./src:/home/ros2_ws/src                   # Persistencia de archivos
      # Montar la autoridad X11 para no usar xhost +local:
      - ${HOME}/.Xauthority:/root/.Xauthority:rw 

    privileged: true
    stdin_open: true
    tty: true

    # Configuración de GPU explícita
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    command: sh -c "mkdir -p /tmp/runtime-root && chmod 700 /tmp/runtime-root && chown -R 1000:1000 /home/ros2_ws/src && bash"